services:
  mcp-evidence:
    build: .
    ports:
      - "8080:8080"
    environment:
      TARGET_MCP_URL: "${TARGET_MCP_URL:-http://host.docker.internal:9000/mcp}"
      DATABASE_PATH: "${DATABASE_PATH:-/app/data/audit.sqlite3}"
      POLICY_PATH: "${POLICY_PATH:-/app/config/policies.json}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
      PROXY_TOKEN: "${PROXY_TOKEN:-}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro

  stdio-bridge:
    build: .
    profiles: ["stdio-demo"]
    command: ["uvicorn", "mcp_evidence.stdio_bridge:app", "--host", "0.0.0.0", "--port", "9100"]
    ports:
      - "9100:9100"
    environment:
      STDIO_MCP_COMMAND: '["python", "examples/mock_stdio_mcp_server.py"]'
      STDIO_REQUEST_TIMEOUT_SECONDS: "30"
